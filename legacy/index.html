<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AzWeather 3D - Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/globe.gl"></script>
</head>
<body>

    <div class="container">
        <aside class="sidebar glass">
            <div class="search-area">
                <input type="text" id="city-input" placeholder="Şəhər və ya ölkə..." autocomplete="off">
                <button id="search-btn">🔍</button>
            </div>

            <div class="weather-info">
                <h2 id="city-display">Yüklənir...</h2>
                <div class="main-temp"><span id="temp">--</span>°C</div>
                <p id="desc">Hava vəziyyəti</p>
                
                <div class="temp-details">
                    <div class="detail-box">Hiss edilən: <span id="feels-like">--</span>°C</div>
                    <div class="detail-box">Min: <span id="temp-min">--</span>° / Max: <span id="temp-max">--</span>°</div>
                </div>

                <div class="stats-grid">
                    <div class="stat-item">💧 Rütubət: <span id="hum">--</span>%</div>
                    <div class="stat-item">🌬️ Külək: <span id="wind">--</span> km/s</div>
                    <div class="stat-item">🎈 Təzyiq: <span id="press">--</span> hPa</div>
                </div>
            </div>

            <hr class="separator">
            
            <h3>5 Günlük Proqnoz</h3>
            <div class="forecast-grid" id="forecast-grid">
                </div>
        </aside>

        <main class="globe-container" id="globeViz"></main>
    </div>

    <script src="script.js"></script>
</body>
</html>
